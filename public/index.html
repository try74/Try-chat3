<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#1e1f2c;color:#fff;padding:16px}
        .join,.chat{max-width:500px;margin:20px auto;background:#2a2b38;border-radius:20px;padding:20px}
        .chat{display:none}
        input,button{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:none}
        button{background:#5a67d8;color:#fff;font-weight:bold}
        #messages{height:400px;overflow:auto;background:#1e1f2c;border-radius:16px;padding:12px;margin-bottom:12px}
        .msg{margin-bottom:8px}
        .name{color:#8b9af0;font-weight:bold}
        .system{color:#aaa;font-style:italic;text-align:center;font-size:13px}
        .input-area{display:flex;gap:8px}
        #input{flex:1}
        #send{width:auto;padding:12px 20px}
    </style>
</head>
<body>
<div class="join" id="joinPanel">
    <h2>Ваше имя</h2>
    <input type="text" id="nameInput" placeholder="Например, Анна">
    <button id="joinBtn">Войти</button>
</div>
<div class="chat" id="chatPanel">
    <h2>Чат</h2>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Сообщение...">
        <button id="send">➤</button>
    </div>
</div>
<script>
    let ws = null, currentUser = '';
    document.getElementById('joinBtn').onclick = () => {
        const name = document.getElementById('nameInput').value.trim();
        if(!name) return;
        currentUser = name;
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        ws.onopen = () => ws.send(JSON.stringify({type:'join', name:currentUser}));
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'system') {
                addMessage(null, data.text, true);
                if(data.text.includes('присоединился')) {
                    document.getElementById('joinPanel').style.display = 'none';
                    document.getElementById('chatPanel').style.display = 'block';
                }
            } else if(data.type === 'message') addMessage(data.name, data.text);
        };
        ws.onclose = () => addMessage(null, 'Потеря связи', true);
    };
    function addMessage(name, text, isSystem) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        if(isSystem) {
            div.className = 'system';
            div.textContent = text;
        } else {
            div.className = 'msg';
            div.innerHTML = `<span class="name">${escapeHtml(name)}:</span> ${escapeHtml(text)}`;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    document.getElementById('send').onclick = () => {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if(text && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type:'message', text}));
            input.value = '';
        }
    };
    document.getElementById('input').addEventListener('keypress', (e) => {if(e.key==='Enter') document.getElementById('send').click();});
    function escapeHtml(str){return str.replace(/[&<>]/g,function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
</script>
</body>
</html>
